name: llama_cpp_dart
description: "Dart binding for llama.cpp --- high level wrappers for both Dart and Flutter"
version: 0.3.5 # Fix position math in chunked prefill (off-by-N decode failure)
homepage: https://github.com/AdmiralTolwyn/llama_cpp_dart
repository: https://github.com/AdmiralTolwyn/llama_cpp_dart

environment:
  sdk: '>=3.2.0 <4.0.0'
  flutter: ">=1.20.0"

flutter:
  plugin:
    platforms:
      android:
        # Compiles llama.cpp + mtmd via android/llamalib/build.gradle (NDK/CMake).
        # Produces libmtmd.so + libllama.so bundled into the APK jniLibs.
        ffiPlugin: true
      ios:
        # Native code provided via ios/llama_cpp_dart.podspec (vendored Llama.xcframework).
        # CocoaPods handles linking; ffiPlugin: true tells Flutter to treat this as FFI.
        ffiPlugin: true
      macos:
        # Compiled from source via macos/CMakeLists.txt → adds Metal support on Apple Silicon.
        # DynamicLibrary.process() in llama.dart picks up the bundled dylib.
        ffiPlugin: true
      linux:
        # Compiled from source via linux/CMakeLists.txt.
        ffiPlugin: true
      windows:
        # Compiled from source via windows/CMakeLists.txt.
        ffiPlugin: true

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.5
  typed_isolate: ^6.0.0
  uuid: ^4.5.1
  image: ^4.7.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  ffigen: ^20.1.1
  path_provider: ^2.1.5
  system_info2: ^4.0.0
  http: ^1.6.0
  intl: 0.20.2

analyzer:
  exclude:
    - 'lib/src/core/llama_cpp.dart'

ffigen: # dart run ffigen
  name: 'llama_cpp'
  description: 'llama.cpp binding'
  output: 'lib/src/core/llama_cpp.dart'
  # ignore-source-errors: true
  headers:
    entry-points:
      - 'src/llama.cpp/include/llama.h'
      - 'src/llama.cpp/tools/mtmd/mtmd.h'
  compiler-opts:
    - '-I/usr/lib/clang/17/include'
    - '-Isrc/llama.cpp/ggml/include'
    - '-Isrc/llama.cpp/include'
    - '-Isrc/llama.cpp/tools/mtmd'
