name: CI

on:
  push:
    branches: [main, vacuumbreather/main]
  pull_request:
    branches: [main, vacuumbreather/main]

jobs:
  analyze-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: false # llama.cpp not needed for Dart-only checks

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      - name: Analyze (lib only)
        run: dart analyze lib/

      - name: Unit tests (no native lib required)
        run: flutter test --exclude-tags integration
